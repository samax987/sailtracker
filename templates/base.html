<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}SailTracker{% endblock %}</title>
  {% block head_scripts %}{% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary:    #0a1628;
      --bg-secondary:  #1a2744;
      --bg-tertiary:   #243458;
      --border:        #2d4a7a;
      --text-primary:  #e2e8f0;
      --text-muted:    #94a3b8;
      --accent-good:   #4ade80;
      --accent-warn:   #fbbf24;
      --accent-danger: #f87171;
      --accent-info:   #60a5fa;
      --accent-wind:   #7dd3fc;
      /* Legacy aliases for compatibility */
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border-legacy:rgba(48,54,61,0.8); --accent:#4a9eff; --accent2:#7ecfff;
      --text:#e6edf3; --text-dim:#8b949e;
      --green:#3fb950; --orange:#d29922; --red:#f85149;
      --radius:8px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    html, body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); min-height: 100%; }
    /* Top navigation */
    .topnav {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex; align-items: center; gap: 4px;
      height: 44px; position: sticky; top: 0; z-index: 200;
    }
    .topnav .brand {
      font-weight: 700; font-size: 0.95rem;
      color: var(--accent-wind); margin-right: 16px; white-space: nowrap;
    }
    .topnav .nav-link {
      color: var(--text-muted); text-decoration: none;
      font-size: 0.8rem; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .topnav .nav-link:hover { color: var(--text-primary); background: rgba(96,165,250,0.12); }
    .topnav .nav-link.active { color: var(--accent-info); background: rgba(96,165,250,0.15); }
    /* Common utilities */
    .btn {
      background: rgba(74,158,255,0.12); border: 1px solid rgba(74,158,255,0.35);
      color: var(--accent-wind); border-radius: var(--radius);
      padding: 6px 12px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font); transition: background 0.2s;
    }
    .btn:hover { background: rgba(74,158,255,0.25); }
  </style>
  {% block head_styles %}{% endblock %}
</head>
<body>

<nav class="topnav">
  <span class="brand">⛵ SailTracker</span>
  <a href="/" class="nav-link {% block nav_tracker %}{% endblock %}">Tracker</a>
  <a href="/passage" class="nav-link {% block nav_passage %}{% endblock %}">Passage</a>
  <a href="/passage/lite" class="nav-link {% block nav_lite %}{% endblock %}">Lite</a>
  <a href="/accuracy" class="nav-link {% block nav_accuracy %}{% endblock %}">Modèles</a>
  <a href="/polars" class="nav-link {% block nav_polars %}{% endblock %}">Polaires</a>
  <a href="/quart" class="nav-link {% block nav_quart %}{% endblock %}" style="background:rgba(59,158,255,.12);border:1px solid rgba(59,158,255,.3)">⚓ Quart</a>
</nav>

{% block content %}{% endblock %}

</body>
</html>
