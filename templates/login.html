<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion — SailTracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060a10;
      --bg2: #0d1520;
      --bg3: #1a2540;
      --border: rgba(59,158,255,0.2);
      --accent: #3b9eff;
      --accent2: #7ecfff;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --green: #3fb950;
      --red: #f85149;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px 16px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }
    .brand .sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 11px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
      font-family: var(--font);
    }
    .btn-primary:hover { opacity: 0.85; }
    .error-msg {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.35);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <span class="icon">⛵</span>
      <h1>SailTracker</h1>
      <div class="sub">Navigation & météo en temps réel</div>
    </div>
    <div class="card">
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
        <div class="form-group">
          <label for="username">Identifiant ou email</label>
          <input type="text" id="username" name="username" placeholder="votre_pseudo ou email@exemple.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">Connexion</button>
      </form>
    </div>
    <div class="footer-links">
      Pas encore de compte ? <a href="/register">Créer un compte</a>
    </div>
  </div>
</body>
</html>
